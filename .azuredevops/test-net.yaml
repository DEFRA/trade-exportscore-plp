pr:
  branches:
    include:
      - test-network

trigger:
  branches:
    include:
      - test-network

pool:
  name: 'DEFRA-COMMON-ubuntu2004-SSV5'

jobs:
- job: NetworkConnectivityTest
  displayName: 'Network Connectivity Test'
  steps:
    - script: |
        echo "========== Network Connectivity Test =========="
        
        # Basic connectivity tests
        echo "Testing DNS resolution..."
        nslookup google.com
        echo ""
        
        echo "Testing internet connectivity..."
        ping -c 3 8.8.8.8
        echo ""
        
        echo "Testing HTTPS connectivity..."
        curl -I https://www.google.com
        echo ""
        
        # Azure-specific tests
        echo "Testing Azure management endpoints..."
        curl -I https://management.azure.com
        echo ""
        
        echo "Testing Azure Cognitive Services endpoints..."
        curl -I https://westeurope.api.cognitive.microsoft.com
        echo ""
        
        # Network interface information
        echo "Network interface information..."
        ip addr show
        echo ""
        
        echo "Routing table..."
        ip route
        echo ""
        
        # DNS configuration
        echo "DNS configuration..."
        cat /etc/resolv.conf
        echo ""
        
        echo "========== Network Test Complete =========="
      displayName: 'Run Network Connectivity Tests'
      continueOnError: true
    
    - script: |
        echo "========== Advanced Network Diagnostics =========="
        
        # Test specific Document Intelligence regions
        echo "Testing Document Intelligence endpoints..."
        curl -v --connect-timeout 10 https://uksouth.api.cognitive.microsoft.com 2>&1 || echo "UK South endpoint test failed"
        curl -v --connect-timeout 10 https://westeurope.api.cognitive.microsoft.com 2>&1 || echo "West Europe endpoint test failed"
        echo ""
        
        # Test traceroute to Azure
        echo "Traceroute to Azure management..."
        traceroute -m 10 management.azure.com || echo "Traceroute failed"
        echo ""
        
        # Port connectivity test
        echo "Testing port 443 connectivity..."
        timeout 5 bash -c '</dev/tcp/management.azure.com/443' && echo "Port 443 open" || echo "Port 443 blocked"
        echo ""
        
        echo "========== Advanced Diagnostics Complete =========="
      displayName: 'Advanced Network Diagnostics'
      continueOnError: true